<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#b060ff"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="url(#glow)" stroke-width="2"/>
  <!-- Diamond/gem shape (matches your ◈ logo) -->
  <polygon points="32,8 52,32 32,56 12,32" fill="none" stroke="url(#glow)" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Inner diamond -->
  <polygon points="32,16 44,32 32,48 20,32" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.6"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#00f0ff"/>
  <!-- Question mark (puzzle element) -->
  <text x="32" y="37" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#b060ff">?</text>
</svg>
